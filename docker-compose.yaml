# Quick way to bring up training on a rented GPU box that already has the
# nvidia container runtime installed (vast.ai, runpod, lambda labs all do).
#
#   docker compose run --rm train python scripts/prepare_data.py --pop909_dir /data/POP909
#   docker compose run --rm train python scripts/train.py --dry_run_steps 50
#   docker compose run --rm train python scripts/train.py --epochs 80
services:
  train:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: jam-transformer:latest
    runtime: nvidia
    # Docker's default /dev/shm is 64MB — too small for PyTorch DataLoader workers
    # and torch.compile's parallel Triton compile pool (BrokenProcessPool on small shm).
    shm_size: '2gb'
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - WANDB_DISABLED=${WANDB_DISABLED:-}
      - WANDB_NAME=${WANDB_NAME:-}
      - NVIDIA_VISIBLE_DEVICES=all
      # Triton JIT compile parallelism. 1 = safe default for all VRAM tiers.
      # Raise to 4-8 on 24GB+ machines for faster first-step kernel compilation.
      - TORCHINDUCTOR_COMPILE_THREADS=1
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
      - ./output:/app/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
